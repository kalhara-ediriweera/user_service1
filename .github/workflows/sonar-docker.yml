name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3. Install deps
      - name: Install dependencies
        run: npm install

      # 4. SonarCloud
      - name: SonarCloud Analysis
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.organization=kalhara-ediriweera
            -Dsonar.projectKey=kalhara-ediriweera_user-service1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 5. Docker build
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service .

      # 6. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 7. Push image
      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/user-service

      # 8. Deploy (mock or real AWS)
      - name: Deploy to AWS ECS (Mock)
        run: echo "Deploying to AWS ECS..."